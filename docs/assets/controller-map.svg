<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI Operator Controller gamepad map</title>
  <desc id="desc">Synthetic controller layout diagram for local voice dictation, chat navigation, mouse clicks, text cursor movement, and analog scrolling.</desc>
  <defs>
    <style>
      .bg { fill: #f7f6f2; }
      .panel { fill: #ffffff; stroke: #d9d6ce; stroke-width: 2; }
      .controller { fill: #2d3136; stroke: #17191d; stroke-width: 3; }
      .grip { fill: #24282d; }
      .stick { fill: #101318; stroke: #4c545d; stroke-width: 5; }
      .button { stroke: #1c2025; stroke-width: 3; }
      .label { fill: #22272e; font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .small { fill: #4c5560; font-family: "Segoe UI", Arial, sans-serif; font-size: 16px; }
      .tiny { fill: #6c737c; font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; }
      .callout-title { fill: #1f2328; font-family: "Segoe UI", Arial, sans-serif; font-size: 19px; font-weight: 700; }
      .callout-text { fill: #4c5560; font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; }
      .button-text { fill: #ffffff; font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 800; text-anchor: middle; dominant-baseline: middle; }
      .connector { stroke: #6b7280; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .accent-green { fill: #2f9e44; }
      .accent-blue { fill: #1971c2; }
      .accent-yellow { fill: #f08c00; }
      .accent-red { fill: #d9480f; }
      .accent-cyan { fill: #0ca678; }
    </style>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3.5" fill="#6b7280" />
    </marker>
  </defs>

  <rect class="bg" width="1200" height="720" />
  <text x="64" y="76" class="label" style="font-size:34px">AI Operator Controller</text>
  <text x="64" y="108" class="small">Synthetic public gamepad map for hands-light AI workspace control</text>

  <rect x="64" y="145" width="275" height="98" rx="8" class="panel" />
  <text x="88" y="180" class="callout-title">Left stick</text>
  <text x="88" y="208" class="callout-text">Move between chats</text>
  <path d="M 339 194 C 410 214, 449 281, 486 360" class="connector" marker-end="url(#dot)" />

  <rect x="64" y="277" width="275" height="112" rx="8" class="panel" />
  <text x="88" y="312" class="callout-title">D-pad</text>
  <text x="88" y="340" class="callout-text">Move the text cursor</text>
  <text x="88" y="365" class="callout-text">with arrow-key actions</text>
  <path d="M 339 335 C 420 362, 455 429, 487 488" class="connector" marker-end="url(#dot)" />

  <rect x="64" y="424" width="275" height="112" rx="8" class="panel" />
  <text x="88" y="459" class="callout-title">LT / RT</text>
  <text x="88" y="487" class="callout-text">LT: Space</text>
  <text x="88" y="512" class="callout-text">RT: Enter</text>
  <path d="M 339 466 C 415 418, 445 316, 479 283" class="connector" marker-end="url(#dot)" />

  <rect x="860" y="145" width="276" height="112" rx="8" class="panel" />
  <text x="884" y="180" class="callout-title">A / X</text>
  <text x="884" y="208" class="callout-text">A: focus prompt + dictate</text>
  <text x="884" y="233" class="callout-text">X: dictate at current cursor</text>
  <path d="M 860 203 C 810 240, 762 333, 722 424" class="connector" marker-end="url(#dot)" />

  <rect x="860" y="291" width="276" height="112" rx="8" class="panel" />
  <text x="884" y="326" class="callout-title">B</text>
  <text x="884" y="354" class="callout-text">Backspace</text>
  <text x="884" y="379" class="callout-text">Hold to repeat</text>
  <path d="M 860 347 C 810 362, 764 377, 768 378" class="connector" marker-end="url(#dot)" />

  <rect x="860" y="437" width="276" height="112" rx="8" class="panel" />
  <text x="884" y="472" class="callout-title">Right stick</text>
  <text x="884" y="500" class="callout-text">Left/right: scroll target</text>
  <text x="884" y="525" class="callout-text">Up/down: analog scroll speed</text>
  <path d="M 860 493 C 806 479, 765 450, 732 424" class="connector" marker-end="url(#dot)" />

  <rect x="432" y="125" width="336" height="82" rx="8" class="panel" />
  <text x="456" y="160" class="callout-title">LB / RB</text>
  <text x="456" y="188" class="callout-text">Mouse left click / right click</text>
  <path d="M 536 207 C 529 226, 518 244, 511 256" class="connector" marker-end="url(#dot)" />
  <path d="M 664 207 C 678 225, 696 244, 709 256" class="connector" marker-end="url(#dot)" />

  <g transform="translate(355 220) scale(0.85)">
    <path class="grip" d="M 113 185 C 66 201 38 254 29 319 C 22 367 40 411 76 419 C 113 428 135 377 163 340 L 437 340 C 465 377 487 428 524 419 C 560 411 578 367 571 319 C 562 254 534 201 487 185 Z" />
    <path class="controller" d="M 78 92 C 123 36 204 50 243 91 L 357 91 C 396 50 477 36 522 92 C 554 132 570 207 560 280 C 553 334 526 365 489 360 C 455 356 429 314 407 277 L 193 277 C 171 314 145 356 111 360 C 74 365 47 334 40 280 C 30 207 46 132 78 92 Z" />

    <rect x="131" y="20" width="106" height="44" rx="12" fill="#1f2328" />
    <rect x="363" y="20" width="106" height="44" rx="12" fill="#1f2328" />
    <text x="184" y="43" class="button-text" style="font-size:15px">LB</text>
    <text x="416" y="43" class="button-text" style="font-size:15px">RB</text>

    <rect x="94" y="56" width="104" height="34" rx="10" fill="#343a40" />
    <rect x="402" y="56" width="104" height="34" rx="10" fill="#343a40" />
    <text x="146" y="74" class="button-text" style="font-size:13px">LT</text>
    <text x="454" y="74" class="button-text" style="font-size:13px">RT</text>

    <circle cx="155" cy="167" r="45" class="stick" />
    <circle cx="155" cy="167" r="19" fill="#343a40" />
    <text x="155" y="235" class="button-text" style="font-size:13px">LEFT STICK</text>

    <circle cx="444" cy="240" r="45" class="stick" />
    <circle cx="444" cy="240" r="19" fill="#343a40" />
    <text x="444" y="306" class="button-text" style="font-size:13px">RIGHT STICK</text>

    <rect x="131" y="255" width="48" height="126" rx="14" fill="#17191d" />
    <rect x="92" y="294" width="126" height="48" rx="14" fill="#17191d" />
    <text x="155" y="320" class="button-text" style="font-size:13px">D-PAD</text>

    <circle cx="432" cy="132" r="24" class="button accent-yellow" />
    <circle cx="486" cy="186" r="24" class="button accent-red" />
    <circle cx="378" cy="186" r="24" class="button accent-blue" />
    <circle cx="432" cy="240" r="24" class="button accent-green" />
    <text x="432" y="132" class="button-text">Y</text>
    <text x="486" y="186" class="button-text">B</text>
    <text x="378" y="186" class="button-text">X</text>
    <text x="432" y="240" class="button-text">A</text>

    <circle cx="266" cy="187" r="10" fill="#5c6773" />
    <circle cx="334" cy="187" r="10" fill="#5c6773" />
    <rect x="281" y="217" width="38" height="12" rx="6" fill="#5c6773" />
  </g>

  <text x="64" y="666" class="tiny">This diagram is synthetic. It does not show a real user screen, private transcript, or application screenshot.</text>
</svg>
